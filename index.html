<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment Monitoring - NOC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f4f6f9;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

@media (max-width: 768px) {
  body { overflow-y: auto; }
}

.header {
  background: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #ddd;
}

.online { color: #28a745; font-weight: bold; }
.offline { color: red; font-weight: bold; }

.card-pro {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card-pro.alert {
  border: 2px solid red;
  animation: blink 0s infinite;
}

@keyframes blink {
  50% { opacity: 0.6; }
}

.update {
  font-size: 12px;
  font-weight: bold;
}

.slide-enter {
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.dots {
  text-align: center;
  margin-top: 10px;
}

.dot {
  height: 10px;
  width: 10px;
  margin: 0 3px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
}

.dot.active {
  background-color: #333;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #ffffff;
  text-align: center;
  padding: 6px;
  font-size: 12px;
  color: #666;
  border-top: 1px solid #ddd;
}

#dashboard {
  padding-bottom: 50px;
  touch-action: pan-y;
}
</style>
</head>

<body>

<div class="header">
  <b>⚡ EQUIPMENT MONITORING</b>
  <div>
    <span id="statusInternet" class="online me-3">● ONLINE</span>
    <button id="btnFullscreen" onclick="toggleFullscreen()" class="btn btn-sm btn-dark">
      ⛶ Fullscreen
    </button>
  </div>
</div>

<div class="container mt-3" id="dashboard">
  <div class="row" id="container"></div>
  <div class="dots" id="dots"></div>
</div>

<div class="footer">
  ⚡ NOC Monitoring System • Stay Alert & Reliable • Jailani Ahmad © 2026
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyk7ppqUa3JDykkhPzUyBuO1phbn1ipP6ng7d-8mkSiqvdtyquph6QA19UT4emihGM/exec";

let allData = [];
let lastDataString = "";
let currentPage = 0;
const itemsPerPage = 8;
let slideInterval;
let isPaused = false;

// LOAD DATA
function loadData() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      setOnlineStatus(true);

      data.sort((a, b) => b.rusak - a.rusak);

      let newDataString = JSON.stringify(data);
      if (newDataString === lastDataString) return;

      lastDataString = newDataString;
      allData = data;

      renderPage();
      renderDots();
    })
    .catch(() => setOnlineStatus(false));
}

// RENDER
function renderPage() {
  let container = document.getElementById("container");
  container.innerHTML = "";

  let start = currentPage * itemsPerPage;
  let pageData = allData.slice(start, start + itemsPerPage);

  pageData.forEach(item => {

    let total = Number(item.jumlah) || 0;
    let baik = Number(item.baik) || 0;
    let progres = Number(item.progres) || 0;
    let rusak = Number(item.rusak) || 0;

    let warna = rusak > 0 ? "danger" : "success";
    let alertClass = rusak > 0 ? "alert" : "";

    let warnaUpdate = "gray";
    if (item.status_hari === "hari_ini") warnaUpdate = "green";
    else if (item.status_hari === "kemarin") warnaUpdate = "orange";

    let card = `
    <div class="col-6 col-md-4 col-lg-3 mb-3 slide-enter">
      <div class="card-pro ${alertClass}">

        <h6>${item.nama}</h6>

        <span class="badge bg-${warna}">
          ${rusak > 0 ? "RUSAK" : (progres > 0 ? "PROGRES" : "NORMAL")}
        </span>

        <hr>

        <div class="row text-center">
          <div class="col-6">
            <small>Total</small>
            <h5>${total}</h5>
          </div>
          <div class="col-6">
            <small>Baik</small>
            <h5 style="color:green">${baik}</h5>
          </div>
          <div class="col-6 mt-2">
            <small>Progres</small>
            <h5 style="color:orange">${progres}</h5>
          </div>
          <div class="col-6 mt-2">
            <small>Rusak</small>
            <h5 style="color:red">${rusak}</h5>
          </div>
        </div>

        <div class="update mt-2" style="color:${warnaUpdate}">
          Update: ${item.update}
        </div>

      </div>
    </div>
    `;

    container.innerHTML += card;
  });

  updateDots();
}

// DOTS
function renderDots() {
  let totalPage = Math.ceil(allData.length / itemsPerPage);
  let dotsContainer = document.getElementById("dots");
  dotsContainer.innerHTML = "";

  for (let i = 0; i < totalPage; i++) {
    dotsContainer.innerHTML += `<span class="dot" id="dot-${i}"></span>`;
  }
}

function updateDots() {
  let totalPage = Math.ceil(allData.length / itemsPerPage);
  for (let i = 0; i < totalPage; i++) {
    let dot = document.getElementById("dot-" + i);
    if (dot) dot.classList.toggle("active", i === currentPage);
  }
}

// AUTO SLIDE
function startSlide() {
  slideInterval = setInterval(() => {
    if (isPaused || allData.length === 0) return;

    let totalPage = Math.ceil(allData.length / itemsPerPage);
    currentPage = (currentPage + 1) % totalPage;

    renderPage();
  }, 10000);
}

// HOVER PAUSE
document.getElementById("dashboard").addEventListener("mouseenter", () => isPaused = true);
document.getElementById("dashboard").addEventListener("mouseleave", () => isPaused = false);

// SWIPE
let touchStartX = 0;
let touchEndX = 0;

const dashboard = document.getElementById("dashboard");

dashboard.addEventListener("touchstart", (e) => {
  touchStartX = e.changedTouches[0].screenX;
  isPaused = true;
});

dashboard.addEventListener("touchend", (e) => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
  setTimeout(() => isPaused = false, 3000);
});

function handleSwipe() {
  let diff = touchStartX - touchEndX;
  if (Math.abs(diff) < 50) return;

  let totalPage = Math.ceil(allData.length / itemsPerPage);

  if (diff > 0) currentPage = (currentPage + 1) % totalPage;
  else currentPage = (currentPage - 1 + totalPage) % totalPage;

  renderPage();
}

// STATUS INTERNET
function setOnlineStatus(isOnline) {
  const el = document.getElementById("statusInternet");
  el.innerHTML = isOnline ? "● ONLINE" : "● OFFLINE";
  el.className = isOnline ? "online me-3" : "offline me-3";
}

// FULLSCREEN
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

document.addEventListener("fullscreenchange", () => {
  document.getElementById("btnFullscreen").innerHTML =
    document.fullscreenElement ? "❌ Exit" : "⛶ Fullscreen";
});

// INIT
loadData();
startSlide();
setInterval(loadData, 5000);
</script>

</body>
</html>
