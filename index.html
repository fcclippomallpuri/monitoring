<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA Monitoring</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f4f6f9;
  font-family: 'Segoe UI', sans-serif;
  overflow-y: auto;
}

/* HEADER */
.header {
  background: white;
  padding: 10px 15px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

.online { color: #28a745; font-weight: bold; }
.offline { color: red; font-weight: bold; }

/* SCADA BAR */
.scada-bar {
  display: flex;
  background: #0f172a;
  color: white;
  border-radius: 12px;
  padding: 10px;
  overflow-x: auto;
}

.scada-item {
  flex: 1;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.scada-item:last-child { border-right: none; }

.scada-item span {
  font-size: 11px;
  color: #94a3b8;
}

.scada-item b {
  font-size: 18px;
}

.scada-safe { color: #00e676; }
.scada-warning { color: #ffab00; }
.scada-danger { color: #ff1744; text-shadow:0 0 10px red; }

/* CARD */
.card-pro {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

.card-pro.alert {
  border: 2px solid red;
  animation: blink 0s infinite;
}

@keyframes blink {
  50% { opacity: 0.6; }
}

.update { font-size: 12px; }

/* DASHBOARD */
#dashboard {
  max-height: calc(100vh - 150px);
  overflow-y: auto;
  padding-bottom: 60px;
  touch-action: pan-y;
}

/* DOT */
.dots { text-align:center; margin-top:10px; }
.dot {
  height:8px;width:8px;margin:3px;
  background:#bbb;border-radius:50%;display:inline-block;
}
.dot.active { background:#333; }

/* FOOTER */
.footer {
  position: fixed;
  bottom:0;
  width:100%;
  background:#fff;
  text-align:center;
  font-size:12px;
  padding:5px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
  <b>⚡ SCADA MONITORING</b>
  <div>
    <span id="statusInternet" class="online me-2">● ONLINE</span>
    <button onclick="toggleFullscreen()" class="btn btn-sm btn-dark">⛶</button>
  </div>
</div>

<!-- SCADA SUMMARY -->
<div class="container mt-2">
  <div class="scada-bar">

    <div class="scada-item">
      <span>TOTAL</span><br>
      <b id="sumTotal">0</b>
    </div>

    <div class="scada-item">
      <span>BAIK</span><br>
      <b id="sumBaik" style="color:#00c853">0</b>
    </div>

    <div class="scada-item">
      <span>PROGRES</span><br>
      <b id="sumProgres" style="color:#ffab00">0</b>
    </div>

    <div class="scada-item">
      <span>RUSAK</span>
      <b id="sumRusak" style="color:#ff1744">0</b>
    </div>

    <div class="scada-item">
      <span>ISSUE</span><br>
      <b id="sumPersen">0%</b>
    </div>

  </div>
</div>

<!-- DASHBOARD -->
<div class="container mt-2" id="dashboard">
  <div class="row" id="container"></div>
  <div class="dots" id="dots"></div>
</div>

<div class="footer">
  ⚡ NOC Monitoring System • Stay Alert & Reliable • Jailani Ahmad © 2026
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyk7ppqUa3JDykkhPzUyBuO1phbn1ipP6ng7d-8mkSiqvdtyquph6QA19UT4emihGM/exec";

let allData = [];
let lastData = "";
let currentPage = 0;
const itemsPerPage = 8;
let isPaused = false;

/* LOAD */
function loadData(){
 fetch(API_URL)
 .then(res=>res.json())
 .then(data=>{
   setOnlineStatus(true);

   data.sort((a,b)=>b.rusak-a.rusak);

   let str = JSON.stringify(data);
   if(str===lastData) return;
   lastData = str;

   allData = data;

   renderSummary(data);
   renderPage();
   renderDots();
 })
 .catch(()=>setOnlineStatus(false));
}

/* SUMMARY */
function renderSummary(data){
 let total=0,baik=0,progres=0,rusak=0;

 data.forEach(i=>{
   total+=Number(i.jumlah)||0;
   baik+=Number(i.baik)||0;
   progres+=Number(i.progres)||0;
   rusak+=Number(i.rusak)||0;
 });

 let persen = total>0 ? Math.round(((progres+rusak)/total)*100) : 0;

 document.getElementById("sumTotal").innerText=total;
 document.getElementById("sumBaik").innerText=baik;
 document.getElementById("sumProgres").innerText=progres;
 document.getElementById("sumRusak").innerText=rusak;

 let el=document.getElementById("sumPersen");
 el.innerText=persen+"%";
 el.className="";

 if(persen>10) el.classList.add("scada-danger");
 else if(persen>5) el.classList.add("scada-warning");
 else el.classList.add("scada-safe");
}

/* CARD */
function renderPage(){
 let c=document.getElementById("container");
 c.innerHTML="";

 let start=currentPage*itemsPerPage;
 let page=allData.slice(start,start+itemsPerPage);

 page.forEach(i=>{
   let total=i.jumlah||0;
   let baik=i.baik||0;
   let progres=i.progres||0;
   let rusak=i.rusak||0;

   let persen = total>0 ? Math.round(((progres+rusak)/total)*100):0;

   let card=`
   <div class="col-6 col-md-3 mb-3">
     <div class="card-pro ${rusak>0?'alert':''}">
       <b>${i.nama}</b>
       <hr>
       <div class="row text-center">
         <div class="col-6"><small>Total</small><h6>${total}</h6></div>
         <div class="col-6"><small>Baik</small><h6 style="color:green">${baik}</h6></div>
         <div class="col-6"><small>Progres</small><h6 style="color:orange">${progres}</h6></div>
         <div class="col-6"><small>Rusak</small><h6 style="color:red">${rusak}</h6></div>
       </div>
       <small>${persen}% issue</small>
       <div class="update">${i.update}</div>
     </div>
   </div>`;
   c.innerHTML+=card;
 });

 updateDots();
}

/* DOT */
function renderDots(){
 let totalPage=Math.ceil(allData.length/itemsPerPage);
 let d=document.getElementById("dots");
 d.innerHTML="";
 for(let i=0;i<totalPage;i++){
   d.innerHTML+=`<span class="dot" id="dot-${i}"></span>`;
 }
}
function updateDots(){
 let totalPage=Math.ceil(allData.length/itemsPerPage);
 for(let i=0;i<totalPage;i++){
   let dot=document.getElementById("dot-"+i);
   if(dot) dot.classList.toggle("active",i===currentPage);
 }
}

/* SLIDE */
setInterval(()=>{
 if(isPaused || allData.length==0) return;
 let totalPage=Math.ceil(allData.length/itemsPerPage);
 currentPage=(currentPage+1)%totalPage;
 renderPage();
},10000);

/* SWIPE */
let startX=0;
const dash=document.getElementById("dashboard");

dash.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
 isPaused=true;
});
dash.addEventListener("touchend",e=>{
 let endX=e.changedTouches[0].clientX;
 let diff=startX-endX;
 let totalPage=Math.ceil(allData.length/itemsPerPage);

 if(Math.abs(diff)>50){
   currentPage = diff>0 ? (currentPage+1)%totalPage : (currentPage-1+totalPage)%totalPage;
   renderPage();
 }
 setTimeout(()=>isPaused=false,2000);
});

/* STATUS */
function setOnlineStatus(x){
 let el=document.getElementById("statusInternet");
 el.innerHTML = x ? "● ONLINE" : "● OFFLINE";
 el.className = x ? "online me-2" : "offline me-2";
}

/* FULLSCREEN */
function toggleFullscreen(){
 if(!document.fullscreenElement) document.documentElement.requestFullscreen();
 else document.exitFullscreen();
}

/* INIT */
loadData();
setInterval(loadData,5000);
</script>

</body>
</html>
